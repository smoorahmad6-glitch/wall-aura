name: CI Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd src
          npm ci
      - name: Run frontend tests
        run: |
          cd src
          npm run test -- --run
      - name: Build frontend
        run: |
          cd src
          npm run build
      - name: Build Tauri
        run: |
          npm ci
          npm run tauri:build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: src-tauri/target/release/bundle
